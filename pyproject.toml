[dependency-groups]
dev = [
    "ruff (>=0.15.13,<0.16.0)",
    "mypy (>=2.1.0,<3.0.0)",
    "pylint (>=4.0.5,<5.0.0)",
    "pyright (>=1.1.409,<2.0.0)"
]

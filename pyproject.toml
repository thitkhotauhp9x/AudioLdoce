[project]
name = "audio-ldoce"
version = "0.1.0"
description = ""
authors = [
    {name = "manhdt",email = "thitkhotau.no1@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "aqt[qt6] (>=25.9.4,<26.0.0)"
